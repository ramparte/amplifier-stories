deck:
  title: "Cross-Session Intelligence — When Your TUI Remembers Everything"
  template: "default"
  style:
    accent_color: "#FF375F"
    density: standard

slides:
  - type: title
    title: "Cross-Session Intelligence"
    subtitle: "When Your TUI Remembers Everything"
    notes: "amplifier-tui feature deck. February 2026."

  - type: highlight
    title: "The question that started everything"
    highlight_text: "What if your development environment remembered everything you've ever done?"
    body: "Not just the current session. Not just the last few conversations. Everything."
    accent: "red"
    purpose: "Hook the audience with the motivating question"
    pacing: "statement"

  - type: stats
    title: "The most-used Amplifier interface"
    stats:
      - value: "~750+"
        label: "Sessions from one developer alone"
      - value: "~33,645"
        label: "Lines of Code"
      - value: "~1,334"
        label: "Test Functions"
      - value: "~246"
        label: "Commits"
    notes: "amplifier-tui evolved from a simple terminal UI to a full web-native frontend — markdown rendering, Ctrl+K command palette, collapsible sidebar, structured event cards, keyboard shortcuts, ARIA accessibility. ~102 web frontend tests."

  - type: cards
    title: "Every session is an island"
    section_label: "The Problem"
    cards:
      - title: "Sessions don't talk"
        body: "You solved the auth bug in Tuesday's session. Friday's session has no idea. You explain it again."
      - title: "Finding past work is manual"
        body: "\"I know I did something with the caching layer last week...\" Good luck scrolling through hundreds of sessions to find it."
      - title: "No project awareness"
        body: "Sessions exist in a flat list. No grouping by project, no themes, no patterns across your work."
      - title: "Knowledge evaporates"
        body: "Every insight, decision, and pattern discovered in a session lives only in that session's transcript."
    purpose: "Establish the pain points that motivate the feature"

  - type: flow
    title: "A 4-phase rollout"
    steps:
      - "Tag Foundation"
      - "Auto-Tagging"
      - "Project Aggregation"
      - "Cross-Session Intelligence"
    notes: "Turn isolated sessions into a growing knowledge base — incrementally."
    purpose: "Show the incremental plan before diving into each phase"

  - type: code
    title: "Phase 1 — Give sessions a vocabulary"
    language: "bash"
    code: |
      # Tag sessions manually
      /tag auth-refactor
      /tag caching performance

      # Filter sessions by tag
      #auth          → finds all auth-tagged sessions
      #performance   → finds performance sessions

      # Sort by tag groups
      /sort tag       → groups sidebar by first tag
    caption: "A JSON-backed TagStore that lets sessions carry metadata. Tags are normalized, filterable, and visible in the sidebar."

  - type: flow
    title: "Phase 2 — The LLM tags your sessions for you"
    steps:
      - "Untagged Session"
      - "AutoTagger Queue"
      - "Haiku (50 tokens)"
      - "1–3 Tags"
    notes: "Batched: max 3 sessions per 30s cycle. Uses Haiku for cost. Prefers existing tags for consistency. Tracks user removals — never re-tags. Graceful degradation if no API key."

  - type: code
    title: "Phase 3 — Tags become structure"
    language: "text"
    code: |
      /project

      Projects (4 active)

      amplifier-core         42 sessions
        Tags: kernel, hooks, providers, refactor, testing
        Last active: 2h ago

      amplifier-tui          38 sessions
        Tags: web-frontend, sidebar, commands, streaming, tags
        Last active: now

      amplifier-foundation   27 sessions
        Tags: bundles, agents, recipes, explorer
        Last active: 1d ago
    caption: "Sessions and tags aggregate into projects. ProjectAggregator is a stateless service — ~145 lines of code. Zero state to manage."

  - type: section
    title: "Cross-Session Intelligence"
    notes: "Phase 4 — Sessions stop being isolated conversations. They become collective memory."
    pacing: "statement"

  - type: cards
    title: "Four intelligence commands"
    section_label: "Phase 4 — Full Command Suite"
    cards:
      - title: "/project ask <question>"
        body: "Free-form Q&A across your entire project. Ask anything — status, history, decisions, patterns. LLM references specific sessions by date and ID."
        accent: "red"
      - title: "/project search <query>"
        body: "Search transcript content across all sessions. Reads last 64KB per session, returns up to 20 results sorted by recency with context snippets."
      - title: "/project attention"
        body: "Identifies stalled work, frequent topics indicating issues, and sessions that ended without resolution. Prioritized and actionable."
      - title: "/project weekly"
        body: "Weekly summary grouped by theme — not chronologically. Key outcomes, decisions, and blockers surfaced automatically."
    purpose: "Showcase the full command suite that Phase 4 delivers"

  - type: comparison
    title: "From terminal to knowledge base"
    left_label: "Before: Pretty Terminal"
    left_items:
      - "Sessions are disposable"
      - "Flat session list"
      - "Manual organization"
      - "Knowledge locked in transcripts"
      - "\"What did I do last week?\" — shrug"
    right_label: "After: Collective Memory"
    right_items:
      - "Sessions are permanent records"
      - "Organized by project and tags"
      - "Auto-tagged by AI"
      - "Knowledge queryable across sessions"
      - "\"What did I do last week?\" — /project weekly"
    purpose: "Drive home the transformation"

  - type: stats
    title: "Built in approximately one day"
    stats:
      - value: "4"
        label: "Phases shipped"
      - value: "~1,393"
        label: "Lines added"
      - value: "~6"
        label: "New modules"
      - value: "~26 min"
        label: "Minutes, ~4 commits"
    notes: "All four phases reportedly shipped on February 12, 2026 — in ~26 minutes of consecutive commits."

  - type: closing
    title: "Your sessions are already a knowledge base"
    subtitle: "You just need to ask. /project ask · /project search · /project weekly"
    notes: "amplifier-tui — ~750+ sessions and counting"