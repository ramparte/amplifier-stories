deck:
  title: "The Invisible Team — Amplifier Multi-Agent Orchestration"
  template: "default"
  style:
    accent_color: "#B87333"
    density: standard

slides:
  - type: title
    title: "The Invisible Team"
    subtitle: "40+ specialist agents. One conversation. Zero complexity."
    notes: "Amplifier Platform. Active Feature — February 2026."

  - type: highlight
    title: "Simplicity is a team sport"
    highlight_text: "You saw one conversation. A team of experts did the work."
    body: "User says: 'Refactor the auth module to use JWT tokens.' Response: 'Done. Updated auth.py with JWT, migrated 12 test files, verified no security regressions.' Behind the curtain — Explorer surveyed 20 files, Architect designed the solution, Security Guardian audited for vulnerabilities, Builder implemented the code, Test Coverage verified it all."
    accent: "green"
    purpose: "Reveal the illusion of simplicity — one conversation hides many agents"
    pacing: "standard"

  - type: cards
    title: "63 agents across 16 namespaces"
    section_label: "The Team"
    cards:
      - title: "Foundation Core"
        body: "15 agents — Explorer, Zen-Architect, Builder, Bug-Hunter, Security Guardian, Git-Ops, Session Analyst, Web Research"
        accent: "green"
      - title: "Design Intelligence"
        body: "7 agents — System Architect, Component Designer, Art Director, Layout, Responsive, Animation, Voice"
      - title: "Code Intelligence"
        body: "5 agents — LSP Navigator, Python Dev, Python Code-Intel, Rust Dev, Rust Code-Intel"
      - title: "Session Forensics"
        body: "6 agents — CXDB Analyst, Explorer, Diagnostician, Reporter, FS Analyst, Blob Navigator"
      - title: "Content & Stories"
        body: "11 agents — Storyteller, Researcher, Technical Writer, Marketing, Case Study, Release Manager"
      - title: "Superpowers"
        body: "5 agents — Brainstormer, Plan Writer, Implementer, Spec Reviewer, Quality Reviewer"
    purpose: "Show the scale and specialization of the agent roster"

  - type: two_column
    title: "The Context Sink Pattern"
    col1_head: "Parent Session"
    col1_body: "Stays lean and fast. Orchestrates the team. Sees only summaries."
    col2_head: "Agent Session"
    col2_body: "Loads tens of thousands of tokens of specialized knowledge. Reads 20+ files, analyzes deeply. Returns ~500 token summary — the parent never sees the weight."
    notes: "Controlled by two parameters: context_depth × context_scope."
    purpose: "Explain the architectural trick that makes multi-agent orchestration practical"

  - type: comparison
    title: "Token Economics"
    left_label: "Without context sinks"
    left_items:
      - "20,000 tokens in YOUR context"
      - "Session degrades quickly"
      - "Context fills up with every file read"
    right_label: "With context sinks"
    right_items:
      - "~500 tokens returned"
      - "Session stays fast for hours"
      - "40:1 compression ratio (documented design target)"
    notes: "Each agent absorbs the computational weight so the parent doesn't have to."

  - type: content
    title: "Parallel Dispatch"
    bullets:
      - "Independent investigations run simultaneously"
      - "Multiple delegate() calls in a single turn execute in parallel"
      - "Explorer surveys auth, Code Intel traces calls, Architect reviews design — all at once"
      - "Each agent brings different tools — LSP vs grep vs design analysis"
      - "Together they reveal what no single agent could find alone"
    notes: "Concurrency is the key to practical multi-agent orchestration"

  - type: flow
    title: "The Delegation Tree"
    steps:
      - "User Request"
      - "Root Orchestrator"
      - "Parallel Agents (Explorer, Architect, Security)"
      - "Builder Implements"
      - "Tests Verify"
      - "Response Delivered"
    notes: "Observable, Interruptible, Navigable via CXDB context trees."
    purpose: "Show the full lifecycle of a delegated task"

  - type: code
    title: "Agents Are Bundles"
    language: "yaml"
    code: |
      # Agent definition — just a bundle
      agent:
        description: "Security review specialist.
          MUST be used before production deployments."
        instruction: "@agents/security-guardian.md"
        tools:
          - grep            # Search for patterns
          - read_file       # Inspect code
          - python_check    # Validate quality
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-4-*   # Complex reasoning
    caption: "Every agent is a markdown file with YAML config. Same composition rules as any bundle. Fully customizable."

  - type: three_column
    title: "Agent Composition"
    col1_head: "Composable"
    col1_body: "Include behaviors, combine capabilities from multiple bundles"
    col2_head: "Cost-aware"
    col2_body: "Cheaper models for simple tasks, expensive ones for complex reasoning"
    col3_head: "Specialized"
    col3_body: "Each agent declares only the tools it needs — no bloat"

  - type: flow
    title: "The Superpowers Pipeline"
    steps:
      - "/brainstorm"
      - "/write-plan"
      - "/execute"
      - "/verify"
      - "/finish"
    notes: "Each /execute task spawns parallel agents. 2 approval gates. Review loops (max 3 iterations). Declarative, Resumable, Human-in-the-loop."
    purpose: "Show a real multi-agent workflow in action"

  - type: quote
    text: "The best teams are invisible — you see only the result, not the coordination."
    notes: "Amplifier's multi-agent system works the same way."
    pacing: "statement"

  - type: closing
    title: "One conversation. Sixty-three experts. Zero complexity for you."
    subtitle: "Try Amplifier → github.com/microsoft/amplifier"